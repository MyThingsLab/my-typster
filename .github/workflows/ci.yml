name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "dev-ledger/**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore: ["**.md", "docs/**", "dev-ledger/**"]

# Supersede in-flight runs when an agent pushes again to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TYPST_VERSION: "0.14.2"

jobs:
  test:
    # Skip while a PR is a draft; always run on pushes to main.
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # my-things-core and my-guard are sibling repos, not on PyPI — pull from the same owner.
      - name: Install siblings
        run: |
          pip install "my-things-core @ git+https://github.com/${{ github.repository_owner }}/my-things-core@main"
          pip install "my-guard @ git+https://github.com/${{ github.repository_owner }}/my-guard@main"
      # First tool needing a compiler-toolchain binary, not just a Python package —
      # pinned direct download, same version this repo was developed against.
      - name: Install typst CLI
        run: |
          curl -fsSL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" -o typst.tar.xz
          tar -xf typst.tar.xz
          sudo mv "typst-x86_64-unknown-linux-musl/typst" /usr/local/bin/typst
          typst --version
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Tests
        run: pytest
